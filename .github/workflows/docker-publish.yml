name: Build and publish Docker image

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - tag: sage2-ampere
            cuda_arch: "8.6"
          - tag: sage2-ada
            cuda_arch: "8.9"
          - tag: sage2-blackwell
            cuda_arch: "12.0"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            SAGE_CUDA_ARCH_LIST=${{ matrix.cuda_arch }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/comfyui-scail-wrapper:${{ matrix.tag }}
